name = "elek-dns"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Embed blocklist.bin as a binary Data module (import returns an ArrayBuffer).
[[rules]]
type = "Data"
globs = ["**/*.bin"]
fallthrough = true

# Optional configuration:
#   wrangler secret put AUTH_TOKEN     # path-segment gate; also embed it in the app
# [vars]
#   UPSTREAM_DOH = "https://1.1.1.1/dns-query"
