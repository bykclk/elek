# XcodeGen project definition for Elek (code name: Fuse).
#
# Regenerate the .xcodeproj after editing this file:
#   xcodegen generate
#
# ---------------------------------------------------------------------------
# THINGS YOU MUST CHANGE FOR YOUR OWN DEVICE:
#   1. DEVELOPMENT_TEAM below  -> your 10-char Apple Developer Team ID.
#   2. (optional) bundle IDs   -> if you change them, also update:
#        - the App Group string in Elek/Elek.entitlements
#          and ElekProxy/ElekProxy.entitlements
#        - appGroupID / proxyBundleID in Shared/Constants.swift
# The app bundle id and the extension bundle id must share a prefix, and the
# extension id MUST equal <app-id>.dnsproxy to match Constants.swift.
# ---------------------------------------------------------------------------

name: Elek
options:
  bundleIdPrefix: com.bykclk
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: "9DDG73TKPX"            # <- put your Team ID here for device builds
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"     # iPhone only
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

schemes:
  Elek:
    build:
      targets:
        Elek: all
        ElekProxy: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  # -------------------------------------------------------------------------
  # App target
  # -------------------------------------------------------------------------
  Elek:
    type: application
    platform: iOS
    sources:
      - path: Elek
      - path: Shared
      - path: Elek/Resources
        buildPhase: resources
    info:
      path: Elek/Info.plist
      properties:
        CFBundleDisplayName: Elek
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchStoryboardName: LaunchScreen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bykclk.elek
        CODE_SIGN_ENTITLEMENTS: Elek/Elek.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ElekProxy

  # -------------------------------------------------------------------------
  # DNS Proxy Network Extension
  # -------------------------------------------------------------------------
  ElekProxy:
    type: app-extension
    platform: iOS
    sources:
      - path: ElekProxy
      - path: Shared
    info:
      path: ElekProxy/Info.plist
      properties:
        CFBundleDisplayName: ElekProxy
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.dns-proxy
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).DNSProxyProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bykclk.elek.dnsproxy
        CODE_SIGN_ENTITLEMENTS: ElekProxy/ElekProxy.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
