# XcodeGen project definition for Elek (code name: Fuse).
#
# Regenerate the .xcodeproj after editing this file:
#   xcodegen generate
#
# ---------------------------------------------------------------------------
# THINGS YOU MUST CHANGE FOR YOUR OWN DEVICE:
#   1. DEVELOPMENT_TEAM below  -> your 10-char Apple Developer Team ID.
#   2. (optional) bundle ID    -> if you change it, keep it in sync with the
#      "DNS Settings" capability on the App ID.
# Elek is a thin NEDNSSettingsManager client (encrypted DNS) — there is no
# Network Extension target. The DoH resolver lives in worker/.
# ---------------------------------------------------------------------------

name: Elek
options:
  bundleIdPrefix: com.bykclk
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: "9DDG73TKPX"            # <- put your Team ID here for device builds
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"   # Universal (iPhone + iPad) — must run natively on iPad
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

schemes:
  Elek:
    build:
      targets:
        Elek: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  # -------------------------------------------------------------------------
  # App target
  # -------------------------------------------------------------------------
  Elek:
    type: application
    platform: iOS
    sources:
      - path: Elek
      - path: Shared
    # Resolver token, kept out of git. Copy Elek/Secrets.xcconfig.example to
    # Elek/Secrets.xcconfig and fill it in; an empty/missing token just means the
    # app talks to a resolver that has no AUTH_TOKEN set.
    configFiles:
      Debug: Elek/Secrets.xcconfig
      Release: Elek/Secrets.xcconfig
    info:
      path: Elek/Info.plist
      properties:
        CFBundleDisplayName: Elek
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        ELEKDoHToken: $(ELEK_DOH_TOKEN)
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchStoryboardName: LaunchScreen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bykclk.elek
        CODE_SIGN_ENTITLEMENTS: Elek/Elek.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
